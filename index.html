<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的独立网页</title>
    <style>
      /* 内联样式确保主题色立即生效，避免闪烁 */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      html.light, html.light body {
        background-color: #ffffff !important;
        color: #000000;
      }
      html.dark, html.dark body {
        background-color: #1a1a1a !important;
        color: #ffffff;
      }
    </style>
    <script>
      // 在 React 加载前立即设置主题，避免闪烁
      (function() {
        const isInIframe = window.self !== window.top;

        function applyThemeToDOM(theme) {
          document.documentElement.classList.remove('light', 'dark');
          document.documentElement.classList.add(theme);
          document.documentElement.setAttribute('data-theme', theme);
        }

        if (isInIframe) {
          // 监听父窗口主动推送的主题消息
          window.addEventListener('message', function(event) {
            if (event.data && typeof event.data.theme === 'string') {
              var theme = event.data.theme;
              if (theme === 'light' || theme === 'dark') {
                applyThemeToDOM(theme);
              }
            }
          });
        } else {
          // 非 iframe 环境，使用默认 light 主题
          applyThemeToDOM('light');
        }
      })();
    </script>
    <script>
      // GitHub Pages SPA 路由恢复
      (function() {
        var repoName = '/-';
        var pathSegmentsToKeep = 0;
        var l = window.location;
        if (l.search && l.search[1] === '/') {
          var path = l.search.slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&'); })
            .join('?');
          window.history.replaceState(null, null,
            repoName + '/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/\/$/, '') +
            '?' + path +
            l.hash
          );
        }
      })();
    </script>
    <script type="module" crossorigin src="/-/assets/index-BxLs61IG.js"></script>
    <link rel="stylesheet" crossorigin href="/-/assets/index-C-VzLKxZ.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- 本地化：将根路径改为相对路径，避免 file:// 下绝对路径无法加载 -->
  </body>
</html>
